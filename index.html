<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- choice -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main-container w-screen h-screen flex items-center justify-center" id="container">
      <!-- data-container -->
      <div id="data-container" class="w-full h-full hidden bg-white shadow-lg rounded-lg">
        <div
          id="update-record"
          class="hidden flex justify-center items-center min-h-screen bg-gray-100"
        >
          <form id="updateForm" class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-lg">
            <h2 id="heading" class="text-xl font-semibold text-gray-800 mb-6 text-center"></h2>

            <!-- Field Selection -->
            <div class="mb-4">
              <label for="fieldSelect" class="block text-sm font-medium text-gray-700 mb-1"
                >Select Field</label
              >
              <select
                id="fieldSelect"
                name="fieldSelect"
                data-choice
                class="w-full px-3.5 py-3 border border-gray-300 text-[0.875rem] bg-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
              >
                <option value="">Loading fields...</option>
              </select>
            </div>

            <!-- New Value Input -->
            <div class="mb-6">
              <label
                for="fieldValue"
                id="fieldLabel"
                class="block text-sm font-medium text-gray-700 mb-1"
                >New Value</label
              >
              <div id="fieldValueContainer">
                <input
                  type="text"
                  id="fieldValue"
                  required
                  class="w-full px-3.5 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                />
              </div>
            </div>

            <!-- Modal -->
            <div
              id="modal"
              class="fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center hidden"
            >
              <div class="bg-white rounded-lg shadow-lg w-11/12 max-w-2xl pt-8 p-6">
                <!-- <p id="closeModal" class="cursor-pointer text-gray-500 hover:text-gray-700">&times;</p> -->
                <div class="modal-content">
                  <!-- Insert your modal content here -->
                  <div class="h-full flex flex-col justify-around">
                    <div class="flex flex-col gap-6">
                      <div class="w-full relative">
                        <label for="name" class="block text-sm font-medium text-gray-700"
                          >SOW Item</label
                        >
                        <input
                          type="text"
                          name="name"
                          id="name"
                          class="mt-1 block w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                          placeholder="Type at least 5 characters to search..."
                        />
                        <input type="hidden" id="fieldValue" required />
                        <div
                          class="lookup-results"
                          style="
                            display: none;
                            position: absolute;
                            width: 100%;
                            max-height: 200px;
                            overflow-y: auto;
                            z-index: 1000;
                            background: white;
                            border: 1px solid #ddd;
                          "
                        ></div>
                      </div>

                      <div class="flex w-full items-baseline gap-4">
                        <div class="w-full">
                          <label for="startDate" class="block text-sm font-medium text-gray-700"
                            >Start Date</label
                          >
                          <input
                            type="date"
                            name="startDate"
                            id="startDate"
                            class="mt-1 block w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                          />
                        </div>
                        <div class="w-full">
                          <label for="endDate" class="block text-sm font-medium text-gray-700"
                            >End Date</label
                          >
                          <input
                            type="date"
                            name="endDate"
                            id="endDate"
                            class="mt-1 block w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                          />
                        </div>
                      </div>

                      <div class="flex w-full items-center gap-2">
                        <div class="w-full">
                          <label for="client-price" class="block text-sm font-medium text-gray-700"
                            >Client Price</label
                          >
                          <input
                            type="text"
                            name="client-price"
                            id="client-price"
                            class="mt-1 block w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                          />
                        </div>
                        <div class="w-full">
                          <label for="vendor-price" class="block text-sm font-medium text-gray-700"
                            >Vendor Price</label
                          >
                          <input
                            type="text"
                            name="vendor-price"
                            id="vendor-price"
                            class="mt-1 block w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                          />
                        </div>
                      </div>
                      <div class="text-right">
                        <p
                          id="addRow"
                          class="cursor-pointer bg-blue-700 inline-block w-[fit-content] text-white px-4 py-2 rounded hover:bg-blue-800"
                        >
                          Add Row
                        </p>
                      </div>
                    </div>

                    <div>
                      <div
                        id="table-container"
                        class="flex flex-col-reverse gap-3 max-h-52 overflow-y-auto"
                      ></div>

                      <div class="w-full mt-4 mb-4">
                        <p
                          id="addSubForm"
                          class="cursor-pointer w-full bg-blue-500 text-center text-white px-4 py-2 rounded hover:bg-blue-600"
                        >
                          Add SubForm
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Notify Toggle -->
            <div class="mb-6 flex items-center gap-4 justify-end bg-gray-50 p-4 bg-transparent">
              <label for="notifyToggle" class="block text-sm font-medium text-gray-700"
                >Notify Team</label
              >
              <button
                type="button"
                id="notifyToggle"
                class="relative inline-flex h-7 w-14 items-center rounded-full bg-gray-300 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500"
                data-state="false"
              >
                <span
                  class="inline-block h-6 w-6 transform rounded-full bg-white transition-transform"
                  style="margin-left: 4px"
                ></span>
              </button>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              id="updateButton"
              class="w-full flex justify-center items-center bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition duration-200"
            >
              Update Record
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
